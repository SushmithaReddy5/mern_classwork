<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Childhood Drawing</title>
  <style>
    body {
      margin: 0;
      background: skyblue;
      overflow: hidden;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 180px;
      background: #4CAF50;
      background-image: repeating-linear-gradient(45deg, #4CAF50, #4CAF50 10px, #3e8e41 10px, #3e8e41 20px);
    }

    .sun {
      position: absolute;
      top: 40px;
      left: 80px;
      width: 80px;
      height: 80px;
      background: yellow;
      border-radius: 50%;
      box-shadow: 0 0 30px yellow;
    }

    .mountain {
      position: absolute;
      bottom: 180px;
      width: 0;
      height: 0;
      border-left: 200px solid transparent;
      border-right: 200px solid transparent;
      border-bottom: 250px solid #2e2e2e;
      z-index: 0;
    }

    .mountain2 {
      left: 250px;
      border-bottom-color: #3a3a3a;
    }

    .mountain3 {
      left: 500px;
      border-bottom-color: #1f1f1f;
    }

    .house {
      position: absolute;
      bottom: 180px;
      left: 150px;
      width: 120px;
      height: 100px;
      background: #FFD700;
      border: 2px solid #000;
      z-index: 2;
    }

    .roof {
      position: absolute;
      bottom: 280px;
      left: 140px;
      width: 0;
      height: 0;
      border-left: 70px solid transparent;
      border-right: 70px solid transparent;
      border-bottom: 50px solid brown;
      z-index: 2;
    }

    .door {
      position: absolute;
      bottom: 180px;
      left: 190px;
      width: 30px;
      height: 50px;
      background: #654321;
      z-index: 3;
    }

    .window {
      position: absolute;
      bottom: 220px;
      left: 160px;
      width: 25px;
      height: 25px;
      background: #87CEFA;
      border: 2px solid #000;
    }

    .river {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: #1E90FF;
      clip-path: polygon(0 70%, 15% 85%, 30% 75%, 50% 90%, 70% 80%, 100% 100%, 0% 100%);
      z-index: 1;
      opacity: 0.8;
    }

    .bird {
      position: absolute;
      width: 40px;
      height: 20px;
      border-radius: 50%;
      border-top: 2px solid black;
    }

    .bird1 {
      top: 80px;
      left: 300px;
      transform: rotate(20deg);
    }

    .bird2 {
      top: 100px;
      left: 340px;
      transform: rotate(-20deg);
    }

    .boy {
      position: absolute;
      bottom: 180px;
      left: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
    }

    .head {
      width: 24px;
      height: 24px;
      background: #f8c291; /* visible skin tone */
      border-radius: 50%;
      border: 1px solid #333;
    }

    .body {
      width: 14px;
      height: 35px;
      background: red;
      margin-top: 2px;
    }

    .hand {
      position: absolute;
      width: 20px;
      height: 4px;
      background: #f8c291;
      top: 28px;
    }

    .left-hand {
      left: -18px;
      transform: rotate(30deg);
    }

    .right-hand {
      left: 12px;
      transform: rotate(-30deg);
    }

    .leg {
      width: 4px;
      height: 22px;
      background: #333;
      margin: 1px;
    }

    .left-leg {
      margin-right: 3px;
    }

    .right-leg {
      margin-left: 3px;
    }
  </style>
</head>
<body>

  <div class="sun"></div>

  <div class="mountain" style="left: 50px;"></div>
  <div class="mountain mountain2"></div>
  <div class="mountain mountain3"></div>

  <div class="roof"></div>
  <div class="house"></div>
  <div class="door"></div>
  <div class="window"></div>

  <div class="river"></div>

  <div class="bird bird1"></div>
  <div class="bird bird2"></div>

  <div class="boy">
    <div class="head"></div>
    <div class="body"></div>
    <div class="hand left-hand"></div>
    <div class="hand right-hand"></div>
    <div style="display: flex;">
      <div class="leg left-leg"></div>
      <div class="leg right-leg"></div>
    </div>
  </div>

  <div class="ground"></div>
</body>
</html>
